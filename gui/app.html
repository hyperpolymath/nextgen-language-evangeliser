<!DOCTYPE html>
<!-- SPDX-License-Identifier: MPL-2.0 -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nextgen Languages Evangeliser — Correspondence Workspace</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4f6f8;
        --panel: #ffffff;
        --ink: #15212b;
        --muted: #50606e;
        --line: #d4dbe2;
        --accent: #0a6e6a;
        --accent-ink: #ffffff;
        --code: #0f1722;
        --code-ink: #e7eef5;
        --focus: #0a6e6a;
        /* kind hues (>= 4.5:1 on white) */
        --k-cognate: #1f7a3f;
        --k-false: #b03a2e;
        --k-antonym: #1f6aa8;
        --k-alien: #6c3fb0;
        --k-novel: #9a6a00;
        --k-vanished: #5a6470;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1418; --panel: #161e25; --ink: #e7eef5; --muted: #9fb0bd;
          --line: #2a353e; --accent: #36b3ad; --accent-ink: #06211f;
          --code: #0a1016; --code-ink: #dce6ef; --focus: #4fd0c9;
          --k-cognate: #58c98a; --k-false: #ef8a7e; --k-antonym: #74b6e6;
          --k-alien: #b79ce6; --k-novel: #e0b85a; --k-vanished: #aab6c2;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink);
        font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      button, select, input { font: inherit; color: var(--ink); }
      :focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }
      .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr auto; }

      header.topbar {
        display: flex; flex-wrap: wrap; gap: 14px 18px; align-items: center;
        justify-content: space-between; padding: 12px 18px;
        border-bottom: 1px solid var(--line); background: var(--panel);
      }
      .brand { display: flex; gap: 12px; align-items: center; min-width: 0; }
      .mark {
        width: 40px; height: 40px; border-radius: 9px; display: grid; place-items: center;
        background: linear-gradient(135deg, var(--accent), var(--k-alien));
        color: #fff; font-weight: 800; font-size: 17px;
      }
      h1 { margin: 0; font-size: 17px; line-height: 1.15; }
      .motto { margin-top: 2px; color: var(--muted); font-style: italic; }
      .controls { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; }
      .field { display: flex; gap: 6px; align-items: center; }
      .field > label { color: var(--muted); font-size: 12px; }
      select, input[type="search"] {
        min-height: 34px; padding: 0 10px; border: 1px solid var(--line);
        border-radius: 7px; background: var(--panel);
      }
      fieldset.views {
        display: flex; gap: 2px; margin: 0; padding: 3px; border: 1px solid var(--line);
        border-radius: 9px; background: var(--panel);
      }
      fieldset.views legend { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
      .views label {
        padding: 6px 10px; border-radius: 7px; cursor: pointer; color: var(--muted);
        font-size: 13px; white-space: nowrap;
      }
      .views input { position: absolute; opacity: 0; pointer-events: none; }
      .views input:checked + span { color: var(--accent-ink); }
      .views label:has(input:checked) { background: var(--accent); color: var(--accent-ink); }
      .views label:has(input:focus-visible) { outline: 3px solid var(--focus); outline-offset: 1px; }

      main.workspace {
        min-height: 0; display: grid; gap: 14px; padding: 14px;
        grid-template-columns: minmax(240px, 0.85fr) minmax(360px, 1.4fr) minmax(280px, 1fr);
      }
      .pane {
        min-width: 0; min-height: 0; border: 1px solid var(--line); border-radius: 10px;
        background: var(--panel); display: grid; grid-template-rows: auto 1fr; overflow: hidden;
      }
      .pane-header {
        display: flex; gap: 10px; align-items: baseline; justify-content: space-between;
        padding: 11px 13px; border-bottom: 1px solid var(--line);
      }
      .pane-title { font-weight: 700; }
      .pane-hint { color: var(--muted); font-size: 12px; }
      .pane-body { min-height: 0; overflow: auto; padding: 12px; }

      /* index pane */
      .index { list-style: none; margin: 0; padding: 0; display: grid; gap: 6px; }
      .index li {
        border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; cursor: pointer;
        display: grid; gap: 4px; background: var(--panel);
      }
      .index li[aria-selected="true"] { border-color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
      .index .concept { font-weight: 650; }
      .index .pair { color: var(--muted); font-size: 12px; }

      .badge {
        display: inline-flex; align-items: center; gap: 5px; border-radius: 999px;
        padding: 2px 9px; font-size: 12px; font-weight: 650; border: 1px solid currentColor;
      }
      .k-cognate { color: var(--k-cognate); } .k-false { color: var(--k-false); }
      .k-antonym { color: var(--k-antonym); } .k-alien { color: var(--k-alien); }
      .k-novel { color: var(--k-novel); } .k-vanished { color: var(--k-vanished); }

      /* forms pane / view-layers */
      .concept-head { margin: 0 0 12px; font-size: 16px; }
      .sxs { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
      .form-card { min-width: 0; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; }
      .form-lang {
        padding: 6px 10px; font-size: 12px; font-weight: 650; color: var(--muted);
        background: color-mix(in srgb, var(--accent) 8%, transparent); border-bottom: 1px solid var(--line);
      }
      pre.surface {
        margin: 0; padding: 12px; overflow: auto; background: var(--code); color: var(--code-ink);
        font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .cross { font-size: 22px; text-align: center; }
      .cross small { display: block; color: var(--muted); font-size: 11px; }
      .focus-form { font-size: 15px; }
      .glyph-view { text-align: center; padding: 18px 8px; }
      .glyph-view .big { font-size: 56px; line-height: 1; }
      .glyph-view .row { display: flex; justify-content: center; gap: 18px; margin-top: 14px; flex-wrap: wrap; }
      .blockly { display: grid; gap: 10px; justify-items: center; }
      .block {
        width: 100%; max-width: 460px; border: 2px solid var(--accent); border-radius: 12px;
        padding: 10px 14px; background: color-mix(in srgb, var(--accent) 7%, var(--panel));
      }
      .block .blang { font-size: 12px; color: var(--muted); font-weight: 650; }
      .block code { font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace; }
      .connector { font-size: 20px; color: var(--muted); }

      /* classification pane */
      .kind-hero { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
      .kind-hero .glyph { font-size: 34px; }
      .kind-hero .pedagogy { font-weight: 700; }
      .kind-hero .blurb { color: var(--muted); font-size: 13px; }
      .section { margin: 14px 0; }
      .section h3 { margin: 0 0 7px; font-size: 12px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
      .residue { display: flex; gap: 8px; align-items: baseline; }
      .residue .shape { font-weight: 650; }
      .strata { display: flex; flex-wrap: wrap; gap: 6px; }
      .stratum {
        display: inline-flex; gap: 5px; align-items: center; border: 1px solid var(--line);
        border-radius: 999px; padding: 2px 9px; font-size: 12px;
      }
      .stratum.holds { color: var(--k-cognate); border-color: currentColor; }
      .stratum.diverges { color: var(--k-false); border-color: currentColor; }
      .ff-flag {
        margin-top: 8px; padding: 8px 10px; border-radius: 8px; font-size: 13px;
        color: var(--k-false); border: 1px solid currentColor;
        background: color-mix(in srgb, var(--k-false) 8%, transparent);
      }
      .narrative { display: grid; gap: 8px; }
      .narrative .n { border-left: 3px solid var(--accent); padding: 6px 10px; border-radius: 0 8px 8px 0;
        background: color-mix(in srgb, var(--accent) 6%, transparent); }
      .narrative .n b { display: block; font-size: 11px; text-transform: uppercase; color: var(--muted); }
      .residue-note { color: var(--muted); }

      .empty { padding: 24px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; }
      footer.statusbar {
        padding: 8px 18px; border-top: 1px solid var(--line); background: var(--panel);
        color: var(--muted); font-size: 13px; display: flex; justify-content: space-between; gap: 10px;
      }

      @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
      @media (max-width: 1000px) {
        main.workspace { grid-template-columns: 1fr; }
        .sxs { grid-template-columns: 1fr; } .cross { transform: rotate(90deg); }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">NL</div>
          <div>
            <h1>Nextgen Languages Evangeliser</h1>
            <div class="motto">Learn — to love it!</div>
          </div>
        </div>
        <div class="controls">
          <div class="field">
            <label for="filterKind">Kind</label>
            <select id="filterKind" aria-label="Filter by correspondence kind">
              <option value="all">All kinds</option>
              <option value="cognate">Cognate</option>
              <option value="false-friend">False friend</option>
              <option value="antonym">Antonym</option>
              <option value="alien-realization">Alien realization</option>
              <option value="novel">Novel</option>
              <option value="vanished">Vanished</option>
            </select>
          </div>
          <div class="field">
            <label for="search">Find</label>
            <input id="search" type="search" placeholder="concept or language" aria-label="Search correspondences">
          </div>
          <fieldset class="views">
            <legend>View layer</legend>
            <label><input type="radio" name="view" value="side-by-side" checked><span>Side&#8209;by&#8209;side</span></label>
            <label><input type="radio" name="view" value="focus"><span>Focus</span></label>
            <label><input type="radio" name="view" value="glyph"><span>Glyph</span></label>
            <label><input type="radio" name="view" value="blockly"><span>Blocks</span></label>
            <label><input type="radio" name="view" value="raw"><span>Raw</span></label>
          </fieldset>
        </div>
      </header>

      <main class="workspace">
        <section class="pane" aria-labelledby="hIndex">
          <div class="pane-header">
            <div class="pane-title" id="hIndex">Correspondences</div>
            <div class="pane-hint" id="indexCount">—</div>
          </div>
          <div class="pane-body">
            <ul class="index" id="index" role="listbox" aria-label="Correspondences" tabindex="0"></ul>
          </div>
        </section>

        <section class="pane" aria-labelledby="hForms">
          <div class="pane-header">
            <div class="pane-title" id="hForms">Forms</div>
            <div class="pane-hint" id="viewHint">side-by-side</div>
          </div>
          <div class="pane-body" id="paneForms"></div>
        </section>

        <section class="pane" aria-labelledby="hClassify">
          <div class="pane-header">
            <div class="pane-title" id="hClassify">Classification</div>
            <div class="pane-hint">kind · residue · strata · narrative</div>
          </div>
          <div class="pane-body" id="paneClassify"></div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="status" aria-live="polite">Loading…</span>
        <span>Classify, don't translate · the six CorrespondenceKinds</span>
      </footer>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
