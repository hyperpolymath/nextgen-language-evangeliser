# SPDX-License-Identifier: MPL-2.0
# Prevention workflow - validates all workflows have proper security config
name: Workflow Security Linter

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    paths:
      - '.github/workflows/**'

permissions: read-all

jobs:
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check SPDX headers
        run: |
          errors=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            if ! head -1 "$f" | grep -q "SPDX-License-Identifier"; then
              echo "ERROR: $f missing SPDX header"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Check permissions declaration
        run: |
          errors=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            if ! grep -q "^permissions:" "$f"; then
              echo "ERROR: $f missing permissions declaration"
              errors=$((errors + 1))
            fi
          done
          exit $errors

      - name: Check pinned actions
        run: |
          errors=0
          for f in .github/workflows/*.yml .github/workflows/*.yaml; do
            [ -f "$f" ] || continue
            UNPINNED=$(grep -nE '^[[:space:]]*uses:.*@' "$f" | grep -Ev '@[0-9a-f]{40}([[:space:]]+#|[[:space:]]*$)' || true)
            if [ -n "$UNPINNED" ]; then
              echo "ERROR: $f has unpinned actions:"
              echo "$UNPINNED"
              errors=$((errors + 1))
            fi
          done
          exit $errors
