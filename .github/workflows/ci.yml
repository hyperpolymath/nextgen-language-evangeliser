# SPDX-License-Identifier: MPL-2.0
name: CI

on:
  push:
    branches: [ main, develop, 'claude/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run daily at 2am UTC to catch dependency issues
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    if: vars.RUN_EXTENSION_CI == 'true'

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20.x]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Lint
      run: |
        cd extension
        npm run lint

    - name: Type check
      run: |
        cd extension
        npx tsc --noEmit

    - name: Compile
      run: |
        cd extension
        npm run compile

    - name: Run tests
      run: |
        cd extension
        npm test

    - name: Run coverage
      if: matrix.os == 'ubuntu-latest'
      run: |
        cd extension
        npm run test:coverage

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
      with:
        files: ./extension/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    if: vars.RUN_EXTENSION_CI == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Run security audit
      run: |
        cd extension
        npm audit --audit-level=moderate

    - name: Check for vulnerable dependencies
      run: |
        cd extension
        npx audit-ci --moderate

  rsr-compliance:
    name: RSR Compliance Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Check required files
      run: |
        echo "Checking RSR Bronze compliance..."

        # Documentation
        test -f README.md || test -f README.adoc || (echo "Missing README.md or README.adoc" && exit 1)
        test -f CONTRIBUTING.md || (echo "Missing CONTRIBUTING.md" && exit 1)
        test -f CODE_OF_CONDUCT.md || (echo "Missing CODE_OF_CONDUCT.md" && exit 1)
        test -f SECURITY.md || (echo "Missing SECURITY.md" && exit 1)
        test -f MAINTAINERS.adoc || (echo "Missing MAINTAINERS.adoc" && exit 1)
        test -f CHANGELOG.md || (echo "Missing CHANGELOG.md" && exit 1)
        test -f CLAUDE.md || (echo "Missing CLAUDE.md" && exit 1)

        # Licenses
        test -f LICENSES/MPL-2.0.txt || (echo "Missing LICENSES/MPL-2.0.txt" && exit 1)
        test -f LICENSES/CC-BY-SA-4.0.txt || (echo "Missing LICENSES/CC-BY-SA-4.0.txt" && exit 1)

        # .well-known/
        test -f .well-known/security.txt || (echo "Missing security.txt" && exit 1)
        test -f .well-known/ai.txt || (echo "Missing ai.txt" && exit 1)
        test -f .well-known/humans.txt || (echo "Missing humans.txt" && exit 1)

        # Build system
        test -f justfile || test -f Justfile || (echo "Missing justfile or Justfile" && exit 1)

        echo "✅ RSR Bronze compliance verified!"

  build:
    name: Build Extension
    runs-on: ubuntu-latest
    if: vars.RUN_EXTENSION_CI == 'true'
    needs: [test, security, rsr-compliance]

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Compile
      run: |
        cd extension
        npm run compile

    - name: Package extension
      run: |
        cd extension
        npx vsce package

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nextgen-languages-evangeliser-vsix
        path: extension/*.vsix

  performance:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.RUN_EXTENSION_CI == 'true'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Run benchmarks
      run: |
        cd extension
        # TODO: Add benchmark script
        echo "Benchmarks would run here"

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'

    - name: Generate docs
      run: |
        echo "Documentation generation would run here"
        # TODO: Add typedoc or similar

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && vars.RUN_EXTENSION_CI == 'true'
    needs: [build]
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: extension/package-lock.json

    - name: Install dependencies
      run: |
        cd extension
        npm ci

    - name: Package extension
      run: |
        cd extension
        npx vsce package

    - name: Create GitHub Release
      uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
      with:
        files: extension/*.vsix
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Attest build provenance
      uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
      with:
        subject-path: 'extension/*.vsix'

