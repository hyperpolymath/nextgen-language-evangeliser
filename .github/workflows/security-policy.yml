# SPDX-License-Identifier: MPL-2.0
name: Security Policy
on:
  push:
    branches: [main, master]
  pull_request:

# Estate guardrail: scope push to default branches (PR fires once, not
# push+PR) and cancel superseded runs. Safe — read-only PR check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Security checks
        run: |
          FAILED=false
          
          # Block MD5/SHA1 for security (allow for checksums/caching)
          WEAK_CRYPTO=$(grep -rE 'md5\(|sha1\(' --include="*.py" --include="*.rb" --include="*.js" --include="*.ts" --include="*.go" --include="*.rs" . 2>/dev/null | grep -vE '^\./(\.git|node_modules|lib)/' | grep -v 'checksum\|cache\|test\|spec' | head -5 || true)
          if [ -n "$WEAK_CRYPTO" ]; then
            echo "⚠️ Weak crypto (MD5/SHA1) detected. Use SHA256+ for security:"
            echo "$WEAK_CRYPTO"
          fi
          
          # Block HTTP URLs (except localhost)
          HTTP_URLS=$(grep -rE "http://[^\"' )]+" --include="*.py" --include="*.js" --include="*.ts" --include="*.go" --include="*.rs" --include="*.yaml" --include="*.yml" --include="*.html" . 2>/dev/null | grep -vE '^\./(\.git|node_modules|lib)/' | grep -vE '^\./\.github/workflows/(security-policy|wellknown-enforcement)\.yml:' | grep -vE 'http://(localhost|127\.0\.0\.1|\$\{hostname\}|example\.com)|test|spec' | head -5 || true)
          if [ -n "$HTTP_URLS" ]; then
            echo "❌ Non-local HTTP URLs found. Use HTTPS:"
            echo "$HTTP_URLS"
            FAILED=true
          fi
          
          # Block hardcoded secrets patterns
          SECRETS=$(grep -rEi "(api_key|apikey|secret_key|password)[[:space:]]*[=:][[:space:]]*[\"'][A-Za-z0-9+/=]{20,}" --include="*.py" --include="*.js" --include="*.ts" --include="*.go" --include="*.rs" --include="*.env" . 2>/dev/null | grep -vE '^\./(\.git|node_modules|lib)/' | grep -v 'example\|sample\|test\|mock\|placeholder' | head -3 || true)
          if [ -n "$SECRETS" ]; then
            echo "❌ Potential hardcoded secrets detected!"
            FAILED=true
          fi
          
          if [ "$FAILED" = true ]; then
            exit 1
          fi
          
          echo "✅ Security policy check passed"
